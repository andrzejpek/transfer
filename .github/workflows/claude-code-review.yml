name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Please review this pull request as a senior Spring Boot backend architect.
            Focus on:
            Correctness:
            - correctness bugs and logic errors
            - broken edge cases
            - missing validation
            - security vulnerabilities
            Spring Boot:
            - thin controllers
            - constructor injection
            - no Lombok usage
            - repositories are persistence-only
            - services orchestrate use cases and transactions
            Domain-Driven Design:
            - domain concepts are explicitly modeled
            - business language is reflected in code
            - entities own their state
            - aggregates protect invariants
            - value objects are used where appropriate
            Rich Domain Model:
            - business behavior should live in domain objects
            - avoid anemic domain model
            - avoid direct entity state mutation from services
            - prefer behavior methods over setter-driven logic
            Hexagonal Architecture:
            - separate domain, application, and infrastructure concerns
            - controllers act as inbound adapters
            - repositories/JPA implementations act as outbound adapters
            - infrastructure concerns should not leak into domain logic
            - domain logic should not depend on Spring or persistence details
            CQRS:
            - commands modify state
            - queries read state
            - CQRS should be used only when it improves clarity
            - do not introduce unnecessary complexity
            Money handling:
            - use BigDecimal.compareTo() for monetary comparisons
            - never use BigDecimal.equals() for monetary comparisons
            Transactions:
            - transaction boundaries must be correct
            - RetryingTransferService must not be @Transactional
            - TransferService should own the transactional use case
            - optimistic locking retry behavior must be safe
            - idempotency must remain correct under concurrent requests
            Tests:
            - tests should cover business behavior
            - tests should cover edge cases
            - tests should cover transaction/idempotency/retry behavior where relevant
            Post inline PR comments where applicable.
            Group final findings as:
            1. Critical
            2. Important
            3. Suggestions
            If the implementation is good, say so clearly.