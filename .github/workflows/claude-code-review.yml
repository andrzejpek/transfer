name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Please review this pull request. Focus on:
            - Correctness bugs and logic errors
            - Security vulnerabilities
            - Adherence to the project's rich domain model principles (behavior on entities, no anemic model)
            - Proper use of BigDecimal.compareTo() for monetary comparisons
            - No Lombok usage
            - Correct transaction boundaries (no @Transactional on RetryingTransferService)
            Post your findings as inline PR comments where applicable.